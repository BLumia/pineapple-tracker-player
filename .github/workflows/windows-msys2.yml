name: Windows MSYS2 Build
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v2
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          pacboy: >-
            toolchain:p ninja:p cmake:p
            qt6:p libopenmpt:p portaudio:p
      - name: Build pineapple-tracker-player
        run: |
          mkdir build && cd build
          cmake .. -G Ninja
          cmake --build . -j
          cd ..
      - name: Prepare for package
        continue-on-error: true
        run: |
          mkdir package_workspace && cd package_workspace
          cp ../build/quick/pineapple-tracker-player-quick.exe ./
          strip -S ./pineapple-tracker-player-quick.exe
          windeployqt --no-translations --no-opengl-sw --no-system-d3d-compiler ./qdeduper.exe
          ldd ./pineapple-tracker-player-quick.exe > deps-trackerplayer.txt
          bash -c 'while read -r line; do path=$(cut -d" " -f3 <<<$line); cp -v $path ./; done <<<$(grep ".*mingw.*bin" deps-trackerplayer.txt); exit 0'
          rm deps-trackerplayer.txt
          # done
          cd ../
      - uses: actions/upload-artifact@v2
        with:
          name: msys2-mingw-w64-x86_64-windows
          path: package_workspace/*
